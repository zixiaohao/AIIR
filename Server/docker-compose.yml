services:
  aiir-server:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: aiir-server:latest
    pull_policy: build
    container_name: aiir-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 挂载外部配置文件（优先使用）
      - /etc/aiir/config.json:/app/config.json
      # 持久化上传文件目录
      - /etc/aiir/uploaded_files:/app/uploaded_files
    environment:
      # 可选：通过环境变量覆盖配置
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      # AES密钥（对象存储secret_key加解密所需，必须与加密时使用的密钥一致）
      # - AIIR_AES_KEY=your_base64_encoded_aes_key_here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"