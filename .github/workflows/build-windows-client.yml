name: Build Windows Client

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'winClient/**'
      - 'windowsclient_gaint/**'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'winClient/**'
      - 'windowsclient_gaint/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-winclient:
    name: Build winClient
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build winClient
        working-directory: ./winClient
        run: |
          go build -ldflags "-s -w" -o ../dist/windows_check.exe main.go

      - name: Upload winClient artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_check
          path: dist/windows_check.exe

  build-windowsclient-gaint:
    name: Build windowsclient_gaint
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build windowsclient_gaint
        working-directory: ./windowsclient_gaint
        run: |
          go build -ldflags "-s -w" -o ../dist/windows_check_gaint.exe .
          go build -ldflags "-s -w" -o ../dist/action_executor_gaint.exe action_executor_gaint.go types.go

      - name: Upload windowsclient_gaint artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_check_gaint
          path: |
            dist/windows_check_gaint.exe
            dist/action_executor_gaint.exe

  release:
    name: Create Release
    needs: [build-winclient, build-windowsclient-gaint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=v$(date +'%Y%m%d')-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          body: |
            自动构建的Windows客户端

            **包含文件：**
            - `windows_check.exe` — 标准版Windows客户端
            - `windows_check_gaint.exe` — 增强版（一次性全量分析 + 自动修复命令执行）
            - `action_executor_gaint.exe` — 修复命令执行器

            **构建信息：**
            - 提交: ${{ github.sha }}
            - 时间: ${{ steps.date.outputs.date || 'N/A' }}
          files: |
            dist/windows_check.exe
            dist/windows_check_gaint.exe
            dist/action_executor_gaint.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
